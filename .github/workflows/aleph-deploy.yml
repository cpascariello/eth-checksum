name: Aleph Cloud Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA to deploy'
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: https://api.stasho.xyz
      AUDIENCE: https://api.stasho.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.inputs.commit || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Register deploy (installing)
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          curl -sLSf -X POST "$BACKEND_URL/api/deploy/report" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg msg "$COMMIT_MSG" --arg url "$ACTIONS_RUN_URL" \
                        '{"status":"installing","commitMessage":$msg,"actionsRunUrl":$url}')"

      - name: Install dependencies
        # --legacy-peer-deps opts into npm 6 resolution rules (warn on
        # peer-dep mismatch instead of failing). Necessary for the
        # ethers v5/v6 transitional state across the ecosystem: a v6 app
        # consuming an SDK whose declared peer is still v5 trips npm 7+
        # by default. Vercel and Netlify default to the same flag.
        run: npm install --legacy-peer-deps

      - name: Report building
        run: |
          TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          curl -sLSf -X POST "$BACKEND_URL/api/deploy/report" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"building"}'

      - name: Build
        run: npm run build

      - name: Report uploading
        run: |
          TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          curl -sLSf -X POST "$BACKEND_URL/api/deploy/report" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"uploading"}'

      - name: Upload artifact
        run: |
          tar -czf /tmp/build.tar.gz -C ./dist .
          TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          curl -sLSf -X POST "$BACKEND_URL/api/deploy/upload" \
            -H "Authorization: Bearer $TOKEN" \
            -F "artifact=@/tmp/build.tar.gz"

      - name: Report failure
        if: failure()
        run: |
          TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r .value)
          curl -sLSf -X POST "$BACKEND_URL/api/deploy/report" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"failed","error":"Workflow failed — see Actions log"}'
